# Stock Subagent Configuration
# Vyse's automated stock monitoring

check_interval_minutes: 30

# Alert delivery
alert_channel: telegram
alert_target: "8742211590"

# Price check settings
price_source: stooq  # Primary - more current than Alpha Vantage
alert_on_target_hit: true
alert_on_big_move: false  # Disabled - too noisy
big_move_threshold: 0.05  # 5%

