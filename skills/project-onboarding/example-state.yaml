# ── Walkthrough ──────────────────────────────────────────────────────────────
# First time in a new codebase:
#   python3 onboard.py --scan /path/to/project --format markdown
#   → Prints a filled PROJECT.md template with detected stack + commands
#
# After user validates:
#   python3 onboard.py --register /path/to/project
#   → Registers in state + writes PROJECT.md
#
# Agent auto-loads PROJECT.md on next session in that directory.
# Monthly refresh: python3 onboard.py --refresh /path/to/project
