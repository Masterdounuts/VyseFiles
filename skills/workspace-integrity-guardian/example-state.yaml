# Weekly cron (Sunday 03:00) detects SOUL.md was fully replaced:
#   python3 guard.py --check
#   → "⚠ Drift detected in 1 file(s):"
#   → "  🔴 SOUL.md: full_replacement  (Δ-1,204 bytes)"
#   → "Run --accept PATH to accept, or --restore PATH to revert."
#
# Agent surfaces this to user:
#   "SOUL.md has been fully replaced (1,204 bytes shorter).
#    This could indicate tampering by an installed skill.
#    Restore from 2026-03-01 baseline, or accept new version?"
#
# User says "restore":
#   python3 guard.py --restore ~/.openclaw/workspace/SOUL.md
#   → "✓ Restored: SOUL.md from baseline (2026-03-01)"
#
# User says "accept" (they intentionally edited it):
#   python3 guard.py --accept ~/.openclaw/workspace/SOUL.md
#   → "✓ Accepted: SOUL.md — baseline updated"
