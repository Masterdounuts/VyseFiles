# Example: multi-agent-coordinator state with 3 parallel agents
timeout_minutes: 30
agents:
  - agent_id: coder
    role: code_implementation
    channel: C001
    status: active
    current_task: "Implement JWT auth middleware"
    last_seen: "2026-03-15T11:40:00.000000"
    registered_at: "2026-03-15T09:00:00.000000"
    output_keys: [api_design]
  - agent_id: reviewer
    role: code_review
    channel: C002
    status: active
    current_task: "Review PR #42 auth changes"
    last_seen: "2026-03-15T11:38:00.000000"
    registered_at: "2026-03-15T09:00:00.000000"
    output_keys: [api_design]
  - agent_id: docs-writer
    role: documentation
    channel: C003
    status: timed_out
