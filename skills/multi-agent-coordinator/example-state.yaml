    last_seen: "2026-03-15T10:50:00.000000"
    registered_at: "2026-03-15T09:00:00.000000"
    output_keys: []
contradictions:
  - key: api_design
    agents: [coder, reviewer]
    values: ["POST /users", "PUT /users/{id}"]
    detected_at: "2026-03-15T11:35:00.000000"
    resolved: false
    resolution: ""
handoffs: []
outputs:
  - key: api_design
    agent_id: coder
    value: "POST /users"
    recorded_at: "2026-03-15T11:30:00.000000"
  - key: api_design
    agent_id: reviewer
    value: "PUT /users/{id}"
    recorded_at: "2026-03-15T11:35:00.000000"
# ── Walkthrough ──────────────────────────────────────────────────────────────
# Health check finds docs-writer timed out (50min, threshold 30min):
#   python3 run.py --health-check
#   → "✗ docs-writer — TIMED OUT (50min ago)"
#   → Orchestrator prompts: "docs-writer hasn't responded. Reassign?"
#
# Consistency check finds api_design contradiction:
#   python3 run.py --consistency-check --key api_design
